MultilibVersion: '1.0'

Groups:

- Name: stdlibs
  Type: Exclusive

Variants:

- Dir: aarch64-none-elf/aarch64a-8.3-branch-protection
  Flags:
  - --target=aarch64-unknown-none-elf
  - -mbranch-protection=pac-ret+bti
  - -march=armv8.3-a
  Group: stdlibs

- Dir: aarch64-none-elf/aarch64a-8.3-pauthtest
  Flags:
  - --target=aarch64-unknown-none-pauthtest
  - -march=armv8.3-a
  Group: stdlibs


Mappings:

# -mbranch-protection options
- Match: -mbranch-protection=(standard|pac-ret(\+leaf)?(\+bti)?|bti(\+pac-ret(\+leaf)?)?)
  Flags:
  - -mbranch-protection=pac-ret+bti

# Expand -march=...+[no]feature... into individual options we can match
# on. We use 'armvX' to represent a feature applied to any architecture, so
# that these don't need to be repeated for every version. Libraries which
# require a particular architecture version or profile should also match on the
# original option to check that.
- Match: -march=armv.*\+aes($|\+.*)
